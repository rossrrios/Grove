<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — Grove</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3c.5 2 2.5 4 5 4 0 3-1 6-3 8l-2 2-2-2c-2-2-3-5-3-8 2.5 0 4.5-2 5-4z"/>
        </svg>
        Grove
      </div>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Get your free Grove workspace in seconds.</p>

      <div class="auth-alert" id="alertBox"></div>

      <form class="auth-form" id="signupForm" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your full name" autocomplete="name" />
          <div class="field-error" id="nameError"></div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
          <div class="field-error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="field-wrapper">
            <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password" />
            <button type="button" class="pw-toggle" id="pwToggle1" tabindex="-1" aria-label="Toggle password visibility">Show</button>
          </div>
          <div class="field-error" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <div class="field-wrapper">
            <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password" />
            <button type="button" class="pw-toggle" id="pwToggle2" tabindex="-1" aria-label="Toggle confirm visibility">Show</button>
          </div>
          <div class="field-error" id="confirmError"></div>
        </div>

        <button type="submit" class="auth-submit" id="submitBtn">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </main>

  <script src="../js/services/storage-service.js"></script>
  <script src="../js/services/auth-service.js"></script>
  <script src="../js/services/auth-ui.js"></script>
</body>
</html>
